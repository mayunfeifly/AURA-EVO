<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA EVO</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="aura-container">
    <!-- Header -->
    <header class="aura-header">
      <div class="aura-logo">
        <div class="aura-ring"></div>
        <span class="aura-title">AURA</span>
      </div>
      <span class="aura-badge">EVO</span>
    </header>

    <!-- Main Content -->
    <main class="aura-main">
      <!-- User Twin Status -->
      <section class="aura-section aura-twin">
        <div class="aura-section-header">
          <h2>Your Twin</h2>
          <span class="aura-status aura-status--ready">Ready</span>
        </div>
        <div class="aura-twin-card">
          <div class="aura-twin-avatar">
            <div class="aura-twin-ring"></div>
            <span class="aura-twin-initial">Y</span>
          </div>
          <div class="aura-twin-info">
            <h3>Your Digital Self</h3>
            <p>Upload documents to distill your knowledge</p>
          </div>
          <button class="aura-btn aura-btn--primary">Distill</button>
        </div>
      </section>

      <!-- Expert Marketplace -->
      <section class="aura-section aura-market">
        <div class="aura-section-header">
          <h2>Expert Market</h2>
          <a href="#" class="aura-link">View all</a>
        </div>
        <div class="aura-expert-list">
          <div class="aura-expert-card">
            <div class="aura-expert-icon aura-expert-icon--finance">F</div>
            <div class="aura-expert-info">
              <h4>Finance Pro</h4>
              <p>Investment & market analysis</p>
            </div>
            <span class="aura-tag">Free</span>
          </div>
          <div class="aura-expert-card">
            <div class="aura-expert-icon aura-expert-icon--tech">T</div>
            <div class="aura-expert-info">
              <h4>Tech Lead</h4>
              <p>Architecture & engineering</p>
            </div>
            <span class="aura-tag">Free</span>
          </div>
          <div class="aura-expert-card">
            <div class="aura-expert-icon aura-expert-icon--cuisine">C</div>
            <div class="aura-expert-info">
              <h4>Cuisine Master</h4>
              <p>Recipes & techniques</p>
            </div>
            <span class="aura-tag aura-tag--premium">$2.99</span>
          </div>
        </div>
      </section>

      <!-- Quick Actions -->
      <section class="aura-section aura-actions">
        <button class="aura-btn aura-btn--ghost">
          <span class="aura-icon">+</span>
          New Chat
        </button>
        <button class="aura-btn aura-btn--ghost">
          <span class="aura-icon">↑</span>
          Upload Knowledge
        </button>
      </section>
    </main>

    <!-- Footer -->
    <footer class="aura-footer">
      <span>v0.1.0</span>
      <a href="https://aura-evo.com" target="_blank">aura-evo.com</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
